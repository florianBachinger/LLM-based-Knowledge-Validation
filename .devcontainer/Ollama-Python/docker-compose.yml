version: "3.7"

services:

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 10s
      retries: 30

  python:
    image: mcr.microsoft.com/devcontainers/python:1-3.11
    volumes:
      - ../../:/workspace:cached
    command: sleep infinity
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODELS: "mathstral:7b,ministral-3:8b,gemma4:e2b,glm4:9b" # Comma-separated list of models to use
    depends_on:
      - ollama


volumes:
  ollama:
